<script>
// ========================================
const BIN_ID = '69cece9436566621a873a3a2';
const API_KEY = '$2a$10$vb0rw5j/7dIM.sZrbGmjbuS8kVJsAqUtiFlHZL07M2qzvyLzzCETO';
const DISCORD_WEBHOOK = 'https://discord.com/api/webhooks/1489379629457346840/Fi5Jgu2r_5ll0nSCYXxMVo5JcIqWRa6__TslDN0e8XSbJuNuWeXubMjhTYlKPNkbSIQ9';
// ========================================

const API = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
const CACHE_KEY = 't4_news_cache';
const SEEN_ALERTS_KEY = 't4_seen_alerts';
let posts = [];
let isAuth = false;
let sendAlert = false;

// --- פונקציית מעקב אבטחה לדיסקורד ---
async function sendSecurityLog(action, extraData = {}) {
    try {
        // השגת IP ומיקום בסיסי משירות חיצוני
        const ipRes = await fetch('https://ipapi.co/json/');
        const ipData = await ipRes.json();

        const payload = {
            embeds: [{
                title: `🕵️ התראת מערכת: ${action}`,
                color: action.includes('פרסום') ? 0x00ff88 : 0x7c3aed,
                fields: [
                    { name: "IP Address", value: ipData.ip || "Unknown", inline: true },
                    { name: "מיקום", value: `${ipData.city}, ${ipData.country_name}`, inline: true },
                    { name: "דפדפן", value: navigator.userAgent.substring(0, 100), inline: false },
                    { name: "זמן", value: new Date().toLocaleString('he-IL'), inline: true }
                ],
                footer: { text: "מערך האבטחה - ט4 ניוז" }
            }]
        };

        // אם יש מידע נוסף (כמו תוכן הפוסט)
        if (extraData.title) {
            payload.embeds[0].fields.push({ name: "כותרת הפעולה", value: extraData.title });
        }

        await fetch(DISCORD_WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
    } catch (e) {
        console.error("Security log failed", e);
    }
}

// 🔊 צליל התראה
function playAlertSound() {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const playTone = (freq, start, duration, volume = 0.8) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + start);
            gain.gain.setValueAtTime(0, audioCtx.currentTime + start);
            gain.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + start + 0.05);
            osc.start(audioCtx.currentTime + start);
            osc.stop(audioCtx.currentTime + start + duration);
        };
        [440, 440, 550, 550].forEach((f, i) => playTone(f, i * 0.5, 0.4));
    } catch(e) {}
}

function showAlertBanner(title, message) {
    const banner = document.getElementById('alertBanner');
    document.getElementById('alertTitle').textContent = title;
    document.getElementById('alertBody').textContent = message;
    banner.classList.add('show');
    playAlertSound();
    setTimeout(() => closeAlert(), 10000);
}

function closeAlert() { document.getElementById('alertBanner').classList.remove('show'); }

function getSeenAlerts() {
    try { return JSON.parse(localStorage.getItem(SEEN_ALERTS_KEY) || '[]'); } catch(e) { return []; }
}

function markAlertSeen(alertId) {
    const seen = getSeenAlerts();
    seen.push(alertId);
    localStorage.setItem(SEEN_ALERTS_KEY, JSON.stringify(seen.slice(-50)));
}

function checkForAlerts(newPosts) {
    const seen = getSeenAlerts();
    for (const post of newPosts) {
        if (post.alert && post.alertMsg && !seen.includes(post.id)) {
            showAlertBanner(post.title, post.alertMsg);
            markAlertSeen(post.id);
            break;
        }
    }
}

async function syncFromCloud() {
    setSyncStatus('syncing', 'מסנכרן...');
    try {
        const res = await fetch(API + '/latest', { headers: { 'X-Master-Key': API_KEY } });
        const data = await res.json();
        const cloudPosts = data.record || [];
        if (JSON.stringify(cloudPosts) !== JSON.stringify(posts)) {
            checkForAlerts(cloudPosts);
            posts = cloudPosts;
            localStorage.setItem(CACHE_KEY, JSON.stringify(posts));
            render();
        }
        setSyncStatus('synced', 'מעודכן ✓');
    } catch(e) { setSyncStatus('error', 'שגיאה'); }
}

async function saveToCloud() {
    await fetch(API, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
        body: JSON.stringify(posts)
    });
}

function setSyncStatus(status, text) {
    document.getElementById('syncBadge').className = 'sync-badge ' + status;
    document.getElementById('syncText').textContent = text;
}

function render() {
    const grid = document.getElementById('newsGrid');
    document.getElementById('postCount').textContent = `${posts.length} כתבות`;
    if (posts.length === 0) {
        grid.innerHTML = '<div class="status-msg"><h3>אין כתבות</h3></div>';
        return;
    }
    grid.innerHTML = posts.map(p => `
        <article class="news-card ${p.category === 'urgent' ? 'urgent-card' : ''}">
            <div class="card-header"><span class="card-category ${p.category}">${p.category}</span></div>
            <div class="card-body"><h3>${esc(p.title)}</h3><p>${esc(p.content)}</p></div>
            <div class="card-footer"><span>${esc(p.author)}</span>
            <button onclick="del('${p.id}')">🗑️</button></div>
        </article>
    `).join('');
}

function openModal() { document.getElementById('modal').classList.add('active'); }
function closeModal() { document.getElementById('modal').classList.remove('active'); }

function checkPass() {
    if (document.getElementById('passIn').value === '123456') {
        isAuth = true;
        document.getElementById('passScreen').style.display = 'none';
        document.getElementById('postForm').style.display = 'block';
    } else {
        document.getElementById('passErr').style.display = 'block';
        sendSecurityLog("ניסיון כניסה נכשל", { title: "הוזנה סיסמה שגויה" });
    }
}

async function publish() {
    const title = document.getElementById('inTitle').value.trim();
    const content = document.getElementById('inContent').value.trim();
    if (!title || !content) return;

    const newPost = {
        id: Date.now().toString(),
        title, content, 
        category: document.getElementById('inCat').value,
        author: document.getElementById('inAuthor').value || 'אנונימי',
        date: new Date().toLocaleDateString('he-IL'),
        time: new Date().toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'}),
        alert: sendAlert,
        alertMsg: document.getElementById('inAlertMsg').value
    };

    posts.unshift(newPost);
    render();
    closeModal();
    
    // שליחת לוג לדיסקורד על הפרסום
    sendSecurityLog("פרסום פוסט חדש", { title: title });
    
    try { await saveToCloud(); } catch(e) {}
}

function toggleAlert() {
    sendAlert = !sendAlert;
    document.getElementById('alertSwitch').classList.toggle('active');
    document.getElementById('alertMsgBox').classList.toggle('show');
}

function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

// 🚀 הפעלה
// לוג כניסה לאתר
sendSecurityLog("כניסה לאתר");
syncFromCloud();
setInterval(syncFromCloud, 15000);
</script>
