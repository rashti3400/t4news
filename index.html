<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערך החדשות | ט4</title>
    <link rel="icon" href="logo.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #0f0f1a;
            --secondary: #1a1a2e;
            --accent: #00d4ff;
            --accent2: #7c3aed;
            --accent3: #00ff88;
            --text: #e0e0e0;
            --text-bright: #ffffff;
            --card-bg: #16213e;
            --border: rgba(0, 212, 255, 0.15);
            --gradient1: linear-gradient(135deg, #00d4ff, #7c3aed);
        }
        
        body {
            font-family: 'Heebo', sans-serif;
            background: var(--primary);
            color: var(--text);
            min-height: 100vh;
        }
        
        .bg-animation {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        
        .circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.05;
            animation: float 20s infinite ease-in-out;
        }
        
        .circle:nth-child(1) { width: 600px; height: 600px; background: var(--accent); top: -200px; right: -100px; }
        .circle:nth-child(2) { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; left: -100px; animation-delay: -7s; }
        .circle:nth-child(3) { width: 300px; height: 300px; background: var(--accent3); top: 50%; left: 50%; animation-delay: -14s; }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.05); }
        }
        
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15, 15, 26, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 40px;
        }
        
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }
        
        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo-section img {
            width: 45px; height: 45px;
            border-radius: 12px;
            border: 2px solid var(--accent);
        }
        
        .logo-text h1 {
            font-size: 1.3rem;
            background: var(--gradient1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .logo-text span {
            font-size: 0.7rem;
            color: var(--accent);
            letter-spacing: 3px;
        }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .sync-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            transition: all 0.3s;
        }
        
        .sync-badge.syncing {
            background: rgba(255, 165, 0, 0.15);
            border: 1px solid rgba(255, 165, 0, 0.3);
            color: #ffa500;
        }
        
        .sync-badge.synced {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: var(--accent3);
        }
        
        .sync-badge.error {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: #ff4444;
        }
        
        .sync-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: currentColor;
        }
        
        .sync-badge.syncing .sync-dot {
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .live-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 0, 0, 0.15);
            border: 1px solid rgba(255, 0, 0, 0.3);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #ff4444;
        }
        
        .live-dot {
            width: 8px; height: 8px;
            background: #ff4444;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        
        .btn {
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Heebo', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: var(--gradient1);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
        }
        
        .ticker-bar {
            background: linear-gradient(90deg, var(--accent2), var(--accent), var(--accent2));
            padding: 8px 0;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }
        
        .ticker-content {
            display: flex;
            animation: ticker 30s linear infinite;
            white-space: nowrap;
        }
        
        .ticker-content span {
            color: var(--primary);
            font-weight: 700;
            font-size: 0.85rem;
            padding: 0 50px;
        }
        
        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        
        main {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 40px;
        }
        
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }
        
        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .section-title .icon {
            width: 35px; height: 35px;
            background: var(--gradient1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .section-title h2 {
            font-size: 1.5rem;
            color: var(--text-bright);
        }
        
        .post-count {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--accent);
        }
        
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }
        
        .news-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s;
            animation: cardIn 0.4s ease;
        }
        
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .news-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.15);
        }
        
        .card-header {
            padding: 20px 22px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-category {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 12px;
            border-radius: 6px;
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent);
        }
        
        .card-category.urgent { background: rgba(255, 68, 68, 0.1); color: #ff4444; }
        .card-category.sports { background: rgba(0, 255, 136, 0.1); color: var(--accent3); }
        .card-category.tech { background: rgba(124, 58, 237, 0.1); color: var(--accent2); }
        .card-category.entertainment { background: rgba(255, 165, 0, 0.1); color: #ffa500; }
        
        .card-date {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
        }
        
        .card-body {
            padding: 5px 22px 22px;
        }
        
        .card-body h3 {
            font-size: 1.1rem;
            color: var(--text-bright);
            margin-bottom: 10px;
            line-height: 1.5;
        }
        
        .card-body p {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.7;
        }
        
        .card-footer {
            padding: 12px 22px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-author {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .author-avatar {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: var(--gradient1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: white;
            font-weight: 700;
        }
        
        .card-actions button {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 1rem;
            padding: 4px 8px;
            transition: color 0.3s;
        }
        
        .card-actions button:hover { color: var(--accent); }
        .card-actions .del:hover { color: #ff4444; }
        
        .status-msg {
            text-align: center;
            padding: 80px 20px;
            grid-column: 1 / -1;
        }
        
        .status-msg .ico { font-size: 4rem; margin-bottom: 20px; opacity: 0.3; }
        .status-msg h3 { color: rgba(255, 255, 255, 0.4); margin-bottom: 10px; }
        .status-msg p { color: rgba(255, 255, 255, 0.25); }
        
        /* Skeleton loading */
        .skeleton-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px;
            animation: shimmer 1.5s infinite;
        }
        
        .skeleton-line {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            margin-bottom: 12px;
        }
        
        .skeleton-line.short { width: 40%; height: 14px; }
        .skeleton-line.title { width: 80%; height: 20px; }
        .skeleton-line.text { width: 100%; height: 14px; }
        .skeleton-line.text2 { width: 70%; height: 14px; }
        
        @keyframes shimmer {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal-overlay.active { display: flex; }
        
        .modal {
            background: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h2 { color: var(--text-bright); }
        
        .modal-close {
            width: 35px; height: 35px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: none;
            color: var(--text);
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s;
        }
        
        .modal-close:hover {
            background: rgba(255, 68, 68, 0.1);
            border-color: #ff4444;
            color: #ff4444;
        }
        
        .modal-body { padding: 25px; }
        
        .pass-screen { text-align: center; padding: 20px 0; }
        .pass-screen .lock { font-size: 3rem; margin-bottom: 15px; }
        .pass-screen p { color: rgba(255, 255, 255, 0.5); margin-bottom: 25px; }
        
        .pass-group {
            display: flex;
            gap: 10px;
            max-width: 300px;
            margin: 0 auto;
        }
        
        .pass-group input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--primary);
            color: var(--text-bright);
            font-family: 'Heebo', sans-serif;
            text-align: center;
            letter-spacing: 5px;
            outline: none;
        }
        
        .pass-group input:focus { border-color: var(--accent); }
        
        .pass-group button {
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            background: var(--gradient1);
            color: white;
            font-family: 'Heebo', sans-serif;
            font-weight: 700;
            cursor: pointer;
        }
        
        .pass-error {
            color: #ff4444;
            font-size: 0.85rem;
            margin-top: 12px;
            display: none;
        }
        
        .post-form { display: none; }
        
        .fg { margin-bottom: 18px; }
        .fg label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: rgba(255, 255, 255, 0.6); }
        
        .fg input, .fg textarea, .fg select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--primary);
            color: var(--text-bright);
            font-family: 'Heebo', sans-serif;
            outline: none;
        }
        
        .fg input:focus, .fg textarea:focus, .fg select:focus { border-color: var(--accent); }
        .fg textarea { min-height: 100px; resize: vertical; }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .btn-pub {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: var(--gradient1);
            color: white;
            font-family: 'Heebo', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-pub:hover { box-shadow: 0 8px 25px rgba(0, 212, 255, 0.3); }
        .btn-pub:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--card-bg);
            border: 1px solid var(--accent);
            padding: 14px 28px;
            border-radius: 12px;
            color: var(--text-bright);
            z-index: 2000;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.4s;
        }
        
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { border-color: #ff4444; }
        
        footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 30px;
            border-top: 1px solid var(--border);
            margin-top: 60px;
        }
        
        footer p { color: rgba(255, 255, 255, 0.3); font-size: 0.8rem; }
        footer .brand { background: var(--gradient1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
        
        @media (max-width: 768px) {
            header { padding: 0 15px; }
            main { padding: 20px 15px; }
            .news-grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .header-content { height: 60px; }
            .sync-badge span:last-child { display: none; }
            .live-badge { display: none; }
        }
    </style>
</head>
<body>

<script>
// ========================================
const BIN_ID = '69cece9436566621a873a3a2';
const API_KEY = '$2a$10$vb0rw5j/7dIM.sZrbGmjbuS8kVJsAqUtiFlHZL07M2qzvyLzzCETO';
// ========================================

const API = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
const CACHE_KEY = 't4_news_cache';
let posts = [];
let isAuth = false;

const catLabels = {
    general: '📰 כללי',
    urgent: '🔴 דחוף',
    sports: '⚽ ספורט',
    tech: '💻 טכנולוגיה',
    entertainment: '🎬 בידור'
};

// ⚡ STEP 1: Show cached data INSTANTLY
function loadCache() {
    try {
        const cached = localStorage.getItem(CACHE_KEY);
        if (cached) {
            posts = JSON.parse(cached);
            render();
            return true;
        }
    } catch(e) {}
    return false;
}

// Save to local cache
function saveCache() {
    localStorage.setItem(CACHE_KEY, JSON.stringify(posts));
}

// ☁️ STEP 2: Sync with cloud in background
async function syncFromCloud() {
    setSyncStatus('syncing', 'מסנכרן...');
    
    try {
        const res = await fetch(API + '/latest', {
            headers: { 'X-Master-Key': API_KEY }
        });
        
        if (!res.ok) throw new Error('Server error');
        
        const data = await res.json();
        const cloudPosts = data.record || [];
        
        // Only update if cloud has different data
        if (JSON.stringify(cloudPosts) !== JSON.stringify(posts)) {
            posts = cloudPosts;
            saveCache();
            render();
        }
        
        setSyncStatus('synced', 'מעודכן ✓');
    } catch(e) {
        console.error('Sync error:', e);
        setSyncStatus('error', 'שגיאה');
    }
}

// Save to cloud
async function saveToCloud() {
    setSyncStatus('syncing', 'שומר...');
    
    try {
        await fetch(API, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'X-Master-Key': API_KEY
            },
            body: JSON.stringify(posts)
        });
        
        setSyncStatus('synced', 'נשמר ✓');
    } catch(e) {
        setSyncStatus('error', 'שגיאה בשמירה');
        throw e;
    }
}

// Sync status indicator
function setSyncStatus(status, text) {
    const badge = document.getElementById('syncBadge');
    const txt = document.getElementById('syncText');
    badge.className = 'sync-badge ' + status;
    txt.textContent = text;
}

// Render posts
function render() {
    const grid = document.getElementById('newsGrid');
    document.getElementById('postCount').textContent = `${posts.length} כתבות`;
    
    if (posts.length === 0) {
        grid.innerHTML = '<div class="status-msg"><div class="ico">📭</div><h3>אין כתבות</h3><p>לחץ "פוסט חדש" להוספה</p></div>';
        return;
    }
    
    grid.innerHTML = posts.map((p, i) => `
        <article class="news-card" style="animation-delay:${i * 0.05}s">
            <div class="card-header">
                <span class="card-category ${p.category}">${catLabels[p.category] || '📰 כללי'}</span>
                <span class="card-date">🕐 ${p.time} • ${p.date}</span>
            </div>
            <div class="card-body">
                <h3>${esc(p.title)}</h3>
                <p>${esc(p.content)}</p>
            </div>
            <div class="card-footer">
                <div class="card-author">
                    <div class="author-avatar">${p.author ? p.author[0] : '?'}</div>
                    <span>${esc(p.author)}</span>
                </div>
                <div class="card-actions">
                    <button onclick="shareFn('${esc(p.title)}')">📤</button>
                    <button class="del" onclick="del('${p.id}')">🗑️</button>
                </div>
            </div>
        </article>
    `).join('');
}

// Show skeleton while first loading
function showSkeleton() {
    const grid = document.getElementById('newsGrid');
    grid.innerHTML = Array(3).fill(`
        <div class="skeleton-card">
            <div class="skeleton-line short"></div>
            <div class="skeleton-line title"></div>
            <div class="skeleton-line text"></div>
            <div class="skeleton-line text2"></div>
        </div>
    `).join('');
}

// Modal
function openModal() {
    document.getElementById('modal').classList.add('active');
    if (isAuth) {
        document.getElementById('passScreen').style.display = 'none';
        document.getElementById('postForm').style.display = 'block';
    } else {
        document.getElementById('passScreen').style.display = 'block';
        document.getElementById('postForm').style.display = 'none';
        document.getElementById('passIn').value = '';
        document.getElementById('passErr').style.display = 'none';
    }
}

function closeModal() { document.getElementById('modal').classList.remove('active'); }
document.getElementById('modal').onclick = e => { if (e.target.id === 'modal') closeModal(); };

function checkPass() {
    if (document.getElementById('passIn').value === '123456') {
        isAuth = true;
        document.getElementById('passScreen').style.display = 'none';
        document.getElementById('postForm').style.display = 'block';
        toast('✅', 'מחובר!');
    } else {
        document.getElementById('passErr').style.display = 'block';
    }
}

// ⚡ Optimistic publish - show IMMEDIATELY, save in background
async function publish() {
    const title = document.getElementById('inTitle').value.trim();
    const content = document.getElementById('inContent').value.trim();
    const category = document.getElementById('inCat').value;
    const author = document.getElementById('inAuthor').value.trim() || 'אנונימי';
    const btn = document.getElementById('btnPub');
    
    if (!title || !content) { toast('⚠️', 'מלא כותרת ותוכן', true); return; }
    
    btn.disabled = true;
    btn.textContent = '⏳ מפרסם...';
    
    const now = new Date();
    const newPost = {
        id: Date.now().toString(),
        title, content, category, author,
        date: now.toLocaleDateString('he-IL'),
        time: now.toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'})
    };
    
    // ⚡ Show immediately (optimistic update)
    posts.unshift(newPost);
    saveCache();
    render();
    closeModal();
    toast('🎉', 'פורסם!');
    
    // Clear form
    document.getElementById('inTitle').value = '';
    document.getElementById('inContent').value = '';
    document.getElementById('inAuthor').value = '';
    
    btn.disabled = false;
    btn.textContent = '🚀 פרסם';
    
    // ☁️ Save to cloud in background
    try {
        await saveToCloud();
    } catch(e) {
        toast('⚠️', 'נשמר מקומית, יסונכרן בקרוב', true);
    }
}

// ⚡ Optimistic delete
async function del(id) {
    if (!isAuth) { toast('🔒', 'התחבר קודם', true); return; }
    if (!confirm('למחוק?')) return;
    
    posts = posts.filter(p => p.id !== id);
    saveCache();
    render();
    toast('🗑️', 'נמחק');
    
    try { await saveToCloud(); } catch(e) {}
}

function shareFn(title) {
    if (navigator.share) {
        navigator.share({title: 'ט4: ' + title, url: location.href});
    } else {
        navigator.clipboard.writeText(location.href);
        toast('📋', 'קישור הועתק');
    }
}

function toast(icon, msg, err = false) {
    const t = document.getElementById('toast');
    document.getElementById('tIcon').textContent = icon;
    document.getElementById('tMsg').textContent = msg;
    t.className = 'toast' + (err ? ' error' : '');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

function esc(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

document.onkeydown = e => { if (e.key === 'Escape') closeModal(); };

// ========================================
// 🚀 STARTUP - Fast loading strategy:
// 1. Show skeleton
// 2. Load cache instantly (if exists)
// 3. Sync from cloud in background
// ========================================

const hadCache = loadCache();
if (!hadCache) showSkeleton();

// Sync from cloud (background)
syncFromCloud();

// Auto-sync every 30 seconds
setInterval(syncFromCloud, 30000);
</script>
